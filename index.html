<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FiadosPro | Control de Créditos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #0a0a0a;
            --bg-card: #16162a;
            --bg-input: #0f0f1e;
            --text-main: #e0e0e0;
            --text-muted: #a0a0b0;
            --accent: #00ff88;
            --accent-hover: #00cc6a;
            --danger: #ff4d4d;
            --warning: #ffa500;
            --border: #2a2a40;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-body); color: var(--text-main); padding: 20px; font-size: 14px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
        h1 { font-size: 26px; font-weight: 700; color: var(--accent); }
        h1 span { color: var(--text-muted); font-size: 13px; font-weight: 400; margin-left: 10px; }
        h2 { font-size: 16px; margin-bottom: 15px; }
        .dashboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 30px; }
        .card { background: var(--bg-card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); transition: border-color .2s; }
        .card:hover { border-color: var(--accent); }
        .card-label { color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .card-value { font-size: 28px; font-weight: 700; }
        .c-green { color: var(--accent); }
        .c-red { color: var(--danger); }
        .c-orange { color: var(--warning); }
        .section { background: var(--bg-card); padding: 22px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 24px; }
        .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 14px; }
        .form-group { display: flex; flex-direction: column; }
        label { margin-bottom: 5px; color: var(--text-muted); font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
        input, select { background: var(--bg-input); border: 1px solid var(--border); padding: 9px 12px; border-radius: 8px; color: var(--text-main); font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color .2s; }
        input:focus, select:focus { border-color: var(--accent); }
        .btn { background: var(--accent); color: #000; border: none; padding: 9px 18px; border-radius: 8px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 13px; transition: background .2s; }
        .btn:hover { background: var(--accent-hover); }
        .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
        .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
        .btn-danger { background: transparent; border: 1px solid var(--danger); color: var(--danger); }
        .btn-danger:hover { background: var(--danger); color: #fff; }
        .tabs { display: flex; gap: 8px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 12px; }
        .tab { padding: 7px 16px; cursor: pointer; color: var(--text-muted); border-radius: 8px; font-size: 13px; transition: all .2s; }
        .tab.active { background: rgba(0,255,136,.1); color: var(--accent); font-weight: 600; }
        .table-wrap { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--border); }
        th { color: var(--text-muted); font-weight: 500; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(255,255,255,.02); }
        .badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .b-pendiente { background: rgba(255,165,0,.15); color: var(--warning); }
        .b-vencido { background: rgba(255,77,77,.15); color: var(--danger); }
        .b-pagado { background: rgba(0,255,136,.15); color: var(--accent); }
        .actions { display: flex; gap: 6px; align-items: center; }
        .wa-btn { display: inline-flex; align-items: center; background: #25D366; color: #fff; border: none; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none; gap: 4px; }
        .wa-btn:hover { background: #1ebe5b; }
        .hidden { display: none; }
        .empty { text-align: center; padding: 30px; color: var(--text-muted); }
        .top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .text-muted { color: var(--text-muted); font-size: 12px; }
        .nombre-bold { font-weight: 600; }
        .sub { color: var(--text-muted); font-size: 11px; }
        @media(max-width:600px){ .form-row { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="container">

    <header>
        <div>
            <h1>FiadosPro <span>by A2K Digital Studio</span></h1>
        </div>
        <div class="text-muted" id="fechaHoy"></div>
    </header>

    <!-- Dashboard -->
    <div class="dashboard">
        <div class="card">
            <div class="card-label">Total por Cobrar</div>
            <div class="card-value c-green" id="d-total">Bs. 0</div>
        </div>
        <div class="card">
            <div class="card-label">Vencidos — Urgente</div>
            <div class="card-value c-red" id="d-vencidos">0</div>
        </div>
        <div class="card">
            <div class="card-label">Vencen en 3 días</div>
            <div class="card-value c-orange" id="d-proximos">0</div>
        </div>
        <div class="card">
            <div class="card-label">Clientes con Deuda</div>
            <div class="card-value" id="d-clientes">0</div>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" onclick="tab('fiados')">Fiados</div>
        <div class="tab" onclick="tab('clientes')">Clientes</div>
    </div>

    <!-- FIADOS -->
    <div id="tab-fiados">
        <div class="section">
            <h2>Registrar Fiado</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Cliente</label>
                    <select id="f-cliente"><option value="">Seleccionar...</option></select>
                </div>
                <div class="form-group">
                    <label>Monto (Bs)</label>
                    <input type="number" id="f-monto" min="0" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Fecha de Vencimiento</label>
                    <input type="date" id="f-fecha">
                </div>
            </div>
            <div class="form-group" style="margin-bottom:14px">
                <label>Descripción (opcional)</label>
                <input type="text" id="f-desc" placeholder="Ej: 2kg arroz, 1 aceite...">
            </div>
            <button class="btn" onclick="guardarFiado()">Registrar Fiado</button>
        </div>

        <div class="section">
            <div class="top-row">
                <h2>Historial de Créditos</h2>
                <select id="filtro" onchange="renderFiados()" style="width:160px">
                    <option value="todos">Todos</option>
                    <option value="vencido">Vencidos</option>
                    <option value="pendiente">Pendientes</option>
                    <option value="pagado">Pagados</option>
                </select>
            </div>
            <div class="table-wrap">
                <table>
                    <thead><tr>
                        <th>Cliente</th><th>Monto</th><th>Vence</th>
                        <th>Descripción</th><th>Estado</th><th>Acciones</th>
                    </tr></thead>
                    <tbody id="tb-fiados"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- CLIENTES -->
    <div id="tab-clientes" class="hidden">
        <div class="section">
            <h2>Agregar Cliente</h2>
            <div class="form-row">
                <div class="form-group">
                    <label>Nombre Completo</label>
                    <input type="text" id="c-nombre" placeholder="Ej: Juan Pérez">
                </div>
                <div class="form-group">
                    <label>WhatsApp (con código país)</label>
                    <input type="text" id="c-tel" placeholder="584121234567">
                </div>
            </div>
            <button class="btn" onclick="guardarCliente()">Guardar Cliente</button>
        </div>

        <div class="section">
            <h2>Mis Clientes</h2>
            <div class="table-wrap">
                <table>
                    <thead><tr>
                        <th>Nombre</th><th>Teléfono</th><th>Deuda Activa</th><th>Acciones</th>
                    </tr></thead>
                    <tbody id="tb-clientes"></tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<script>
// ── Storage ──────────────────────────────────────────
let clientes = JSON.parse(localStorage.getItem('fp_clientes') || '[]');
let fiados   = JSON.parse(localStorage.getItem('fp_fiados')   || '[]');

function save() {
    localStorage.setItem('fp_clientes', JSON.stringify(clientes));
    localStorage.setItem('fp_fiados',   JSON.stringify(fiados));
    dashboard();
}

// ── Helpers ──────────────────────────────────────────
const hoy = () => new Date().toISOString().split('T')[0];
const bs  = n => 'Bs. ' + parseFloat(n||0).toFixed(2);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

function estadoFiado(f) {
    if (f.estado === 'pagado') return 'pagado';
    return f.fechaVence < hoy() ? 'vencido' : 'pendiente';
}

function clienteById(id) {
    return clientes.find(c => c.id === id) || { nombre: 'Desconocido', tel: '' };
}

// ── Tab switch ───────────────────────────────────────
function tab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (name==='fiados' ? i===0 : i===1)));
    document.getElementById('tab-fiados').classList.toggle('hidden', name !== 'fiados');
    document.getElementById('tab-clientes').classList.toggle('hidden', name !== 'clientes');
    if (name === 'clientes') renderClientes();
}

// ── Dashboard ────────────────────────────────────────
function dashboard() {
    const hoyStr = hoy();
    const en3 = new Date(); en3.setDate(en3.getDate() + 3);
    const en3Str = en3.toISOString().split('T')[0];

    let total = 0, vencidos = 0, proximos = 0;
    const conDeuda = new Set();

    fiados.forEach(f => {
        const est = estadoFiado(f);
        if (est !== 'pagado') {
            total += parseFloat(f.monto);
            conDeuda.add(f.clienteId);
            if (est === 'vencido') vencidos++;
            else if (f.fechaVence <= en3Str) proximos++;
        }
    });

    document.getElementById('d-total').textContent = bs(total);
    document.getElementById('d-vencidos').textContent = vencidos;
    document.getElementById('d-proximos').textContent = proximos;
    document.getElementById('d-clientes').textContent = conDeuda.size;
}

// ── Clientes ─────────────────────────────────────────
function guardarCliente() {
    const nombre = document.getElementById('c-nombre').value.trim();
    const tel    = document.getElementById('c-tel').value.trim().replace(/\D/g,'');
    if (!nombre || !tel) { alert('Completa nombre y teléfono'); return; }
    clientes.push({ id: uid(), nombre, tel });
    save(); renderClientes(); refreshSelect();
    document.getElementById('c-nombre').value = '';
    document.getElementById('c-tel').value = '';
}

function renderClientes() {
    const tbody = document.getElementById('tb-clientes');
    tbody.innerHTML = '';
    if (!clientes.length) { tbody.innerHTML = '<tr><td colspan="4" class="empty">Sin clientes registrados</td></tr>'; return; }

    clientes.forEach(c => {
        const deuda = fiados.filter(f => f.clienteId === c.id && estadoFiado(f) !== 'pagado')
                            .reduce((s,f) => s + parseFloat(f.monto), 0);
        const tr = document.createElement('tr');
        tr.innerHTML =
            '<td><span class="nombre-bold">' + c.nombre + '</span></td>' +
            '<td class="sub">' + c.tel + '</td>' +
            '<td style="color:' + (deuda > 0 ? 'var(--danger)' : 'var(--accent)') + ';font-weight:600">' + bs(deuda) + '</td>' +
            '<td class="actions">' +
                (deuda > 0 ? '<a class="wa-btn" href="https://wa.me/' + c.tel + '?text=' + encodeURIComponent('Hola ' + c.nombre + ', te recordamos que tienes una deuda pendiente de ' + bs(deuda) + ' con nuestro negocio. Por favor contáctanos para coordinar el pago. Gracias!') + '" target="_blank">💬 Cobrar</a>' : '') +
                '<button class="btn btn-sm btn-danger" onclick="borrarCliente(\'' + c.id + '\')">🗑</button>' +
            '</td>';
        tbody.appendChild(tr);
    });
}

function borrarCliente(id) {
    if (!confirm('¿Eliminar este cliente?')) return;
    clientes = clientes.filter(c => c.id !== id);
    save(); renderClientes(); refreshSelect();
}

function refreshSelect() {
    const sel = document.getElementById('f-cliente');
    const val = sel.value;
    sel.innerHTML = '<option value="">Seleccionar cliente...</option>';
    clientes.forEach(c => {
        const o = document.createElement('option');
        o.value = c.id; o.textContent = c.nombre;
        sel.appendChild(o);
    });
    sel.value = val;
}

// ── Fiados ───────────────────────────────────────────
function guardarFiado() {
    const clienteId  = document.getElementById('f-cliente').value;
    const monto      = parseFloat(document.getElementById('f-monto').value);
    const fechaVence = document.getElementById('f-fecha').value;
    const desc       = document.getElementById('f-desc').value.trim();

    if (!clienteId) { alert('Selecciona un cliente'); return; }
    if (!monto || monto <= 0) { alert('Ingresa un monto válido'); return; }
    if (!fechaVence) { alert('Ingresa la fecha de vencimiento'); return; }

    fiados.push({ id: uid(), clienteId, monto, fechaVence, desc, estado: 'pendiente', fechaReg: hoy() });
    save(); renderFiados();
    document.getElementById('f-monto').value = '';
    document.getElementById('f-desc').value = '';
}

function renderFiados() {
    const tbody  = document.getElementById('tb-fiados');
    const filtro = document.getElementById('filtro').value;
    tbody.innerHTML = '';

    let lista = fiados.map(f => ({ ...f, _est: estadoFiado(f) }))
                      .filter(f => filtro === 'todos' || f._est === filtro)
                      .sort((a,b) => {
                          const orden = { vencido:0, pendiente:1, pagado:2 };
                          if (orden[a._est] !== orden[b._est]) return orden[a._est] - orden[b._est];
                          return a.fechaVence.localeCompare(b.fechaVence);
                      });

    if (!lista.length) { tbody.innerHTML = '<tr><td colspan="6" class="empty">Sin registros</td></tr>'; return; }

    lista.forEach(f => {
        const c    = clienteById(f.clienteId);
        const est  = f._est;
        const badgeClass = est === 'pagado' ? 'b-pagado' : est === 'vencido' ? 'b-vencido' : 'b-pendiente';
        const badgeText  = est === 'pagado' ? 'Pagado' : est === 'vencido' ? 'Vencido' : 'Pendiente';

        const msgWA = encodeURIComponent(
            'Hola ' + c.nombre + '! Te escribimos de nuestro negocio para recordarte que tienes un fiado de ' +
            bs(f.monto) + (f.desc ? ' (' + f.desc + ')' : '') +
            ' que vence el ' + f.fechaVence + '. Por favor coordina el pago. Gracias!'
        );

        const tr = document.createElement('tr');
        tr.innerHTML =
            '<td><span class="nombre-bold">' + c.nombre + '</span><br><span class="sub">' + c.tel + '</span></td>' +
            '<td style="font-weight:600">' + bs(f.monto) + '</td>' +
            '<td>' + f.fechaVence + '</td>' +
            '<td class="sub">' + (f.desc || '—') + '</td>' +
            '<td><span class="badge ' + badgeClass + '">' + badgeText + '</span></td>' +
            '<td class="actions">' +
                (est !== 'pagado'
                    ? '<button class="btn btn-sm" onclick="marcarPagado(\'' + f.id + '\')">✓ Pagado</button>' +
                      '<a class="wa-btn" href="https://wa.me/' + c.tel + '?text=' + msgWA + '" target="_blank">💬</a>'
                    : '<button class="btn btn-sm btn-ghost" onclick="revertir(\'' + f.id + '\')">↩</button>') +
                '<button class="btn btn-sm btn-danger" onclick="borrarFiado(\'' + f.id + '\')">🗑</button>' +
            '</td>';
        tbody.appendChild(tr);
    });
}

function marcarPagado(id) {
    if (!confirm('¿Confirmar pago?')) return;
    const f = fiados.find(x => x.id === id);
    if (f) { f.estado = 'pagado'; save(); renderFiados(); }
}

function revertir(id) {
    const f = fiados.find(x => x.id === id);
    if (f) { f.estado = 'pendiente'; save(); renderFiados(); }
}

function borrarFiado(id) {
    if (!confirm('¿Eliminar este fiado?')) return;
    fiados = fiados.filter(x => x.id !== id);
    save(); renderFiados();
}

// ── Init ─────────────────────────────────────────────
document.getElementById('fechaHoy').textContent =
    new Date().toLocaleDateString('es-VE', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
document.getElementById('f-fecha').value = hoy();
refreshSelect(); dashboard(); renderFiados();
</script>
</body>
</html>
